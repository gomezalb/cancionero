<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#1a1a1a"/>
  <link rel="icon" href="./logo-32.png" type="image/png"/>
  <link rel="manifest" href="./manifest.json"/>
  <title>Cancionero</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1a1a;
      --bg2:       #242424;
      --bg3:       #252525;
      --bg4:       #2c2c2c;
      --border:    #333;
      --border2:   #3a3a3a;
      --text:      #e8e8e8;
      --text2:     #aaa;
      --text3:     #888;
      --text4:     #555;
      --text5:     #333;
      --green-bg:  #1f3a1f;
      --green-bd:  #2a5a2a;
      --green-tx:  #5cb85c;
      --red-bg:    #2a1a1a;
      --red-bd:    #5a2a2a;
      --red-tx:    #c0392b;
      --hl-bg:     #4a3800;
      --hl-tx:     #FAC775;
      --radius:    10px;
      --radius-lg: 12px;
    }

    html, body { height: 100%; background: #111; font-family: system-ui, -apple-system, sans-serif; color: var(--text); }
    #app { max-width: 680px; margin: 0 auto; padding: 1.25rem; min-height: 100vh; zoom: 1.12; }

    /* Tabs */
    #tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
    .tab { padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 0.5px solid var(--border); background: var(--bg2); color: var(--text4); transition: all .12s; user-select: none; }
    .tab.active { background: #2e2e2e; color: var(--text); border-color: #555; }
    .tab .badge { display: inline-block; background: var(--green-bg); color: var(--green-tx); font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 5px; }

    /* Search */
    #search-wrap { position: relative; margin-bottom: .875rem; }
    #search { width: 100%; padding: 9px 16px 9px 38px; font-size: 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg3); color: var(--text); outline: none; }
    #search::placeholder { color: var(--text4); }
    #search:focus { border-color: #555; }
    .si { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text4); font-size: 14px; pointer-events: none; }
    #count { font-size: 12px; color: var(--text4); margin-bottom: .75rem; }
    #filters { display: flex; gap: 6px; margin-bottom: .875rem; flex-wrap: wrap; }
    .filter-btn { padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--border); background: var(--bg2); color: var(--text4); transition: all .12s; user-select: none; }
    .filter-btn:hover { border-color: #555; color: var(--text2); }
    .filter-btn.active { background: #2e2e2e; color: var(--text); border-color: #555; }

    /* Song list */
    #song-list { display: flex; flex-direction: column; gap: 5px; }
    .sc { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: .65rem 1rem; display: flex; align-items: center; gap: 8px; }
    .sc-info { flex: 1; min-width: 0; cursor: pointer; }
    .sc-info:hover .st { color: var(--text2); }
    .st { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sm { font-size: 11px; color: var(--text4); margin-top: 2px; }
    .sp { font-size: 12px; color: var(--text3); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .add-btn { background: var(--green-bg); border: 0.5px solid var(--green-bd); color: var(--green-tx); font-size: 18px; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .12s; }
    .add-btn:hover { background: #254a25; }
    .in-list .add-btn { background: var(--red-bg); border-color: var(--red-bd); color: var(--red-tx); }
    .hl { background: var(--hl-bg); color: var(--hl-tx); border-radius: 2px; padding: 0 2px; }

    /* Loading / error */
    #loading { text-align: center; padding: 3rem 0; color: var(--text4); font-size: 14px; }
    #error-msg { background: var(--red-bg); border: 0.5px solid var(--red-bd); color: var(--red-tx); padding: 1rem 1.25rem; border-radius: var(--radius); font-size: 13px; line-height: 1.6; display: none; }
    #error-msg code { font-family: monospace; font-size: 12px; }

    /* Setlist */
    #setlist-panel { display: none; flex-direction: column; gap: .875rem; }
    #sl-name-wrap { display: flex; gap: 6px; align-items: center; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: .65rem 1rem; }
    #sl-name-label { font-size: 12px; color: var(--text4); flex-shrink: 0; }
    #sl-name { background: none; border: none; color: var(--text); font-size: 14px; font-weight: 500; outline: none; flex: 1; }
    #sl-name::placeholder { color: #444; }
    #sl-saved { font-size: 11px; color: var(--green-tx); opacity: 0; transition: opacity .4s; flex-shrink: 0; }
    #sl-count { font-size: 12px; color: var(--text4); flex-shrink: 0; }
    #sl-toolbar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .sl-btn { background: var(--bg3); border: 0.5px solid var(--border); color: var(--text2); font-size: 12px; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: background .12s; white-space: nowrap; }
    .sl-btn:hover { background: var(--border); color: var(--text); }
    .sl-btn.primary { background: var(--green-bg); border-color: var(--green-bd); color: var(--green-tx); }
    .sl-btn.primary:hover { background: #254a25; }
    .sl-btn.primary:disabled { opacity: .3; cursor: default; }
    .sl-btn.danger { color: var(--red-tx); border-color: #3a1a1a; }
    .sl-btn.danger:hover { background: var(--red-bg); }
    #sl-items { display: flex; flex-direction: column; gap: 5px; min-height: 40px; }
    .sl-item { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: .65rem 1rem; display: flex; align-items: center; gap: 8px; cursor: grab; }
    .sl-item:active { cursor: grabbing; }
    .sl-item.dragging { opacity: .35; }
    .sl-item.drag-over { border-color: #555; background: var(--bg4); }
    .drag-handle { color: #444; font-size: 13px; flex-shrink: 0; }
    .sl-num { font-size: 11px; color: var(--text4); min-width: 18px; flex-shrink: 0; text-align: right; }
    .sl-title { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    .sl-title:hover { color: var(--text2); }
    .sl-meta { font-size: 11px; color: var(--text4); flex-shrink: 0; }
    .sl-remove { background: none; border: none; color: var(--text5); font-size: 15px; cursor: pointer; padding: 0 2px; transition: color .12s; }
    .sl-remove:hover { color: var(--red-tx); }
    #sl-empty { font-size: 13px; color: #444; text-align: center; padding: 2rem 0; border: 0.5px dashed #2a2a2a; border-radius: var(--radius); }

    /* Panel importar desde texto */
    #txt-panel { display: none; flex-direction: column; gap: .75rem; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem; }
    #txt-input { width: 100%; background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text); border-radius: var(--radius); padding: .75rem; font-size: 13px; resize: vertical; min-height: 100px; outline: none; font-family: inherit; }
    #txt-input::placeholder { color: var(--text4); }
    #txt-input:focus { border-color: #555; }
    #txt-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    #txt-status { font-size: 12px; color: var(--text4); flex: 1; }
    /* Resultados de matching */
    #txt-results { display: flex; flex-direction: column; gap: 5px; }
    .match-item { background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius); padding: .6rem 1rem; display: flex; align-items: center; gap: 8px; }
    .match-item.ok { border-color: var(--green-bd); }
    .match-item.warn { border-color: #5a4a00; }
    .match-item.err { border-color: var(--red-bd); }
    .match-icon { font-size: 13px; flex-shrink: 0; }
    .match-original { font-size: 11px; color: var(--text4); }
    .match-found { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .match-found.err { color: var(--red-tx); }
    .match-select { background: var(--bg2); border: 0.5px solid var(--border2); color: var(--text); font-size: 12px; border-radius: 6px; padding: 3px 6px; max-width: 160px; outline: none; display: none; }
    .match-item.warn .match-select,
    .match-item.err .match-select { display: block; }

    /* Acordes */
    .acorde-wrap { display: inline-block; vertical-align: bottom; text-align: center; margin-top: 10px; }
    .acorde-txt { display: block; font-size: .65em; font-weight: 500; color: #7eb8f7; line-height: 1; margin-bottom: -3px; white-space: nowrap; }
    .acorde-sil { display: block; }
    #viewer { display: none; flex-direction: column; }
    #back { font-size: 13px; color: var(--text4); cursor: pointer; margin-bottom: 1rem; display: flex; align-items: center; gap: 5px; border: none; background: none; padding: 0; }
    #back:hover { color: var(--text2); }
    #vtitle { font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    #vmeta { font-size: 12px; color: var(--text4); margin-bottom: 1rem; }
    #slide-box { border-radius: var(--radius-lg); padding: 2rem 1.5rem; min-height: 180px; display: flex; align-items: center; justify-content: center; text-align: center; }
    #slide-box.normal { background: var(--bg2); border: 0.5px solid var(--border); }
    #slide-box.pause { background: #0d0d0d; border: 0.5px solid #181818; }
    #slide-content { font-size: clamp(18px, 5vw, 28px); color: #ddd; }
    #slide-content span[class^="fs-"] { font-size: inherit !important; }
    #fs-content span[class^="fs-"] { font-size: inherit !important; }
    .fs-12{font-size:12px}.fs-14{font-size:14px}.fs-16{font-size:16px}.fs-18{font-size:18px}.fs-20{font-size:20px}.fs-24{font-size:24px}.fs-28{font-size:28px}.fs-32{font-size:32px}.fs-36{font-size:36px}.fs-40{font-size:40px}.fs-44{font-size:44px}.fs-48{font-size:48px}.fs-54{font-size:54px}.fs-60{font-size:60px}.fs-72{font-size:72px}
    #nav { display: flex; align-items: center; gap: 6px; margin-top: .75rem; flex-wrap: wrap; }
    .nav-btn { background: var(--bg3); border: 0.5px solid var(--border); color: var(--text2); font-size: 16px; width: 38px; height: 38px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .12s; }
    .nav-btn:hover:not(:disabled) { background: var(--border); color: var(--text); }
    .nav-btn:disabled { opacity: .3; cursor: default; }
    #slide-counter { font-size: 12px; color: var(--text4); flex: 1; text-align: center; }
    #fs-btn { background: var(--bg3); border: 0.5px solid var(--border); color: var(--text2); font-size: 12px; padding: 0 10px; height: 38px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
    #fs-btn:hover { background: var(--border); color: var(--text); }
    #fs-btn-acordes { background: #1a2e3a; border: 0.5px solid #2a4a5a; color: #7eb8f7; font-size: 12px; padding: 0 10px; height: 38px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
    #fs-btn-acordes:hover { background: #1f3a4a; }
    #fs-retomar { background: var(--green-bg); border: 0.5px solid var(--green-bd); color: var(--green-tx); font-size: 12px; padding: 0 10px; height: 38px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
    #fs-retomar:hover { background: #254a25; }
    #fs-btn-edges { background: var(--bg3); border: 0.5px solid var(--border); color: var(--text2); font-size: 12px; padding: 0 10px; height: 38px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
    #fs-btn-edges:hover { background: var(--border); color: var(--text); }
    #fs-btn-acordes { background: var(--bg3); border: 0.5px solid var(--border); color: var(--text2); font-size: 12px; padding: 0 10px; height: 38px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
    #song-nav { display: flex; gap: 6px; margin-top: .75rem; }

    /* Editor de slide */
    #edit-btn { background: none; border: none; color: var(--text5); font-size: 15px; cursor: pointer; padding: 4px 6px; border-radius: 6px; transition: color .12s, background .12s; line-height: 1; }
    #edit-btn:hover { color: var(--text2); background: var(--bg4); }
    #edit-btn.editado { color: #f0a030; }
    #edit-modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 8000; align-items: center; justify-content: center; padding: 1rem; }
    #edit-modal-bg.open { display: flex; }
    #edit-modal { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 1.25rem; width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: .875rem; }
    #edit-modal-title { font-size: 14px; font-weight: 500; color: var(--text); }
    #edit-modal-sub { font-size: 11px; color: var(--text4); margin-top: -6px; }
    #edit-textarea { width: 100%; min-height: 180px; background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text); border-radius: var(--radius); padding: .75rem; font-size: 14px; line-height: 1.6; resize: vertical; outline: none; font-family: inherit; }
    #edit-textarea:focus { border-color: #555; }
    #edit-modal-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    #edit-guardar { background: var(--green-bg); border: 0.5px solid var(--green-bd); color: var(--green-tx); font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; }
    #edit-guardar:hover { background: #254a25; }
    #edit-cancelar { background: var(--bg3); border: 0.5px solid var(--border); color: var(--text2); font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; }
    #edit-cancelar:hover { background: var(--border); }
    #edit-descartar { background: none; border: none; color: var(--red-tx); font-size: 12px; padding: 6px 10px; cursor: pointer; margin-left: auto; opacity: .7; }
    #edit-descartar:hover { opacity: 1; }
    #edit-descartar.hidden { display: none; }
    #edit-modal-footer { border-top: 0.5px solid var(--border); padding-top: .75rem; }
    #edit-modal-footer.hidden { display: none; }
    #edit-limpiar-todas { background: none; border: none; color: var(--text4); font-size: 11px; cursor: pointer; padding: 0; }
    #edit-limpiar-todas:hover { color: var(--red-tx); }
    .snav-btn { flex: 1; background: var(--bg2); border: 0.5px solid var(--border); color: var(--text4); font-size: 12px; padding: 7px 8px; border-radius: 8px; cursor: pointer; text-align: center; transition: background .12s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .snav-btn:hover:not(:disabled) { background: var(--bg4); color: var(--text2); }
    .snav-btn:disabled { opacity: .2; cursor: default; }


    #fso {
      display: none; position: fixed; inset: 0; background: #000; z-index: 9999;
      flex-direction: column; align-items: stretch;
    }

    /* Franja superior: título + minimizar + cerrar */
    #fs-top {
      display: flex; align-items: center;
      padding: 1rem 1.5rem;
      flex-shrink: 0;
      gap: 1rem;
    }
    #fs-song-title { font-size: 20px; font-weight: 500; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    #fs-song-counter { font-size: 13px; color: #555; white-space: nowrap; flex-shrink: 0; }

    /* Controles de transposición */
    .transp-ctrl { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .transp-btn { background: none; border: 0.5px solid #333; color: #777; font-size: 13px; width: 24px; height: 24px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .12s; line-height: 1; }
    .transp-btn:hover { border-color: #666; color: #ccc; }
    .transp-tono { font-size: 13px; font-weight: 600; color: #7eb8f7; min-width: 36px; text-align: center; }
    /* Versión fullscreen — un poco más grande */
    #fs-transp .transp-btn { width: 28px; height: 28px; font-size: 14px; border-color: #444; }
    #fs-transp .transp-tono { font-size: 15px; min-width: 42px; }
    #fs-minimize, #fs-cl {
      background: none; border: none; color: #888; cursor: pointer; transition: color .12s;
      flex-shrink: 0; padding: 0 4px; line-height: 1;
    }
    #fs-minimize { font-size: 28px; }
    #fs-cl { font-size: 30px; }
    #fs-minimize:hover, #fs-cl:hover { color: #ccc; }

    /* Área central de contenido */
    #fs-center {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 0 80px;
      overflow: hidden;
      min-height: 0;
    }
    #fs-content {
      color: #f0f0f0; text-align: center;
      max-width: 900px; width: 100%;
    }
    #fs-content br.stanza { display: block; margin-top: 1.5em; }
    #fs-content .stanza-sep { display: block; height: 1.5em; }

    /* Botones laterales de diapositiva */
    .fs-side-btn {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #555; font-size: 28px;
      cursor: pointer; padding: 1rem .75rem; transition: color .15s; line-height: 1;
    }
    .fs-side-btn:hover:not(:disabled) { color: #aaa; }
    .fs-side-btn:disabled { opacity: .15; cursor: default; }
    #fs-prev-slide { left: .5rem; }
    #fs-next-slide { right: .5rem; }

    /* En móvil y tablet: ocultar flechas y aprovechar todo el ancho */
    @media (max-width: 1023px) {
      .fs-side-btn { display: none; }
      #fs-center { padding: 0; overflow-y: auto; align-items: flex-start; }
      #fs-content { padding: 1rem; }
      #fs-dots { display: none; }
      #fs-slide-ctr { display: none; }
      #fs-btn-edges { display: none; }
      #fs-content .slide-divider { display: block; border: none; border-top: 0.5px solid #2a2a2a; margin: 1.25em 2rem; }
      #export-btn { display: none; }
      .sl-meta { display: none; }
      #fs-song-title { font-size: 13px; }
      #fs-song-counter { font-size: 11px; }
      #sl-count { display: none; }
    }

    /* Franja inferior: paginador + nav canciones */
    #fs-bottom {
      flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      padding: 1rem 0 1.25rem;
    }
    #fs-dots { display: flex; gap: 12px; align-items: center; }
    .fs-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: #333; transition: background .15s; flex-shrink: 0;
    }
    .fs-dot.active { background: #999; }
    #fs-song-nav { display: flex; align-items: center; gap: 1.5rem; }
    .fs-snb {
      background: none; border: none; color: #555; font-size: 18px;
      cursor: pointer; transition: color .12s; white-space: nowrap; padding: 2px 0;
    }
    .fs-snb:hover:not(:disabled) { color: #aaa; }
    .fs-snb:disabled { opacity: .2; cursor: default; }
    #fs-slide-ctr { font-size: 18px; color: #555; min-width: 64px; text-align: center; }
    #fs-hint { font-size: 12px; color: #222; }

    /* Controles de tamaño de fuente en fullscreen */
    #fs-size-ctrl { display: flex; align-items: center; gap: 4px; }
    #fs-size-ctrl button { background: none; border: 0.5px solid #333; color: #666; border-radius: 5px; cursor: pointer; transition: all .12s; line-height: 1; padding: 3px 7px; }
    #fs-size-ctrl button:hover { border-color: #666; color: #ccc; }
    #fs-size-down { font-size: 11px; }
    #fs-size-reset { font-size: 13px; font-weight: 600; }
    #fs-size-up { font-size: 15px; font-weight: 600; }
    #fs-size-reset.auto { color: #444; border-color: #2a2a2a; }
  </style>
</head>
<body>
<div id="app">
  <div id="tabs">
    <div class="tab active" data-tab="cancionero">Cancionero</div>
    <div class="tab" data-tab="setlist" id="tab-setlist">Crear lista</div>
  </div>

  <div id="cancionero-panel">
    <div id="search-wrap">
      <span class="si">&#9906;</span>
      <input id="search" type="text" placeholder="Buscar canción o letra..." autocomplete="off"/>
    </div>
    <div id="filters">
      <button class="filter-btn active" data-filter="todas">Todas</button>
      <button class="filter-btn" data-filter="himnos">Himnos</button>
      <button class="filter-btn" data-filter="nuevas">Nuevas</button>
      <button class="filter-btn" data-filter="escuela">Esc. bíblica</button>
      <button class="filter-btn" data-filter="navidad">Navidad</button>
    </div>
    <div id="count"></div>
    <div id="loading">Cargando canciones...</div>
    <div id="error-msg"></div>
    <div id="song-list"></div>
  </div>

  <div id="setlist-panel">
    <div id="sl-name-wrap">
      <span id="sl-name-label">Nombre:</span>
      <input id="sl-name" type="text" placeholder="" value=""/>
      <span id="sl-saved">&#10003; guardado</span>
      <span id="sl-count"></span>
    </div>
    <div id="sl-toolbar">
      <button class="sl-btn primary" id="play-btn" disabled>&#9654; Proyectar</button>
      <button class="sl-btn" id="txt-btn">&#9776; Cargar lista</button>
      <button class="sl-btn danger" id="clear-btn">Limpiar lista</button>
      <button class="sl-btn" id="export-btn" style="margin-left:auto;opacity:.45;font-size:11px">&#8595; Json</button>
    </div>

<script>
const LS_KEY = "cancionero_setlist";
let SONGS = [], query = "", activeTab = "cancionero", setlist = [], slName = "";
let viewerSlides = [], viewerIdx = 0, viewerQueue = null;
let activeFilter = "todas";
let mostrarAcordes = false;
let fsMinimizado = false;
let fsMostrarAcordes = false;
let fsConAcordes = false;

// ── Transposición ──────────────────────────────────────────────
// Tabla cromática con notación latina
const CROMATICA = ["DO","DO#","RE","RE#","MI","FA","FA#","SOL","SOL#","LA","LA#","SI"];
const CROMATICA_B = ["DO","REb","RE","MIb","MI","FA","SOLb","SOL","LAb","LA","SIb","SI"];

// Mapa de todos los nombres posibles → índice cromático
const NOTA_A_IDX = {};
CROMATICA.forEach((n,i) => { NOTA_A_IDX[n] = i; NOTA_A_IDX[n.toLowerCase()] = i; });
CROMATICA_B.forEach((n,i) => { NOTA_A_IDX[n] = i; NOTA_A_IDX[n.toLowerCase()] = i; });
// Aliases extra
const ALIASES = {
  "DOb":11,"DOB":11,"SIS":0,"SIS#":1,
  "MIS":4,"MIS#":5,"FAb":4,"FAB":4
};
Object.assign(NOTA_A_IDX, ALIASES);

// Estado de transposición por canción (en memoria, se resetea al cambiar de canción)
let transposicionActual = {}; // { [titulo]: semitono_offset }

function getOffset(titulo) { return transposicionActual[titulo] || 0; }

function transponerNota(nota, semis) {
  // Detectar si es menor (m al final)
  const esM = /m$/.test(nota) && !/maj/.test(nota);
  const base = esM ? nota.slice(0, -1) : nota;
  const idx = NOTA_A_IDX[base];
  if (idx === undefined) return nota; // no reconocida, devolver igual
  const nuevo = (idx + semis + 12) % 12;
  return CROMATICA[nuevo] + (esM ? "m" : "");
}

function transponerTexto(texto, semis) {
  if (!semis) return texto;
  // Reemplazar acordes entre corchetes
  return texto.replace(/\[([^\]]+)\]/g, (_, acorde) => {
    return "[" + transponerNota(acorde, semis) + "]";
  });
}

function transponerTono(tono, semis) {
  if (!tono || !semis) return tono;
  return transponerNota(tono, semis);
}

function cambiarTransposicion(titulo, delta) {
  const actual = getOffset(titulo);
  transposicionActual[titulo] = actual + delta;
  // Refrescar ambas vistas
  renderViewerSlide();
  if (document.getElementById("fso").style.display === "flex") renderFS();
}

function actualizarCtrlTransp(titulo, tono) {
  const offset = getOffset(titulo);
  const tonoTransp = transponerTono(tono, offset);
  const mostrar = !!tono; // solo si la canción tiene tono definido

  // Visor
  const vCtrl = document.getElementById("v-transp");
  if (vCtrl) {
    vCtrl.style.display = mostrar ? "flex" : "none";
    if (mostrar) document.getElementById("v-transp-tono").textContent = tonoTransp || "";
  }
  // Fullscreen
  const fsCtrl = document.getElementById("fs-transp");
  if (fsCtrl) {
    fsCtrl.style.display = mostrar ? "flex" : "none";
    if (mostrar) document.getElementById("fs-transp-tono").textContent = tonoTransp || "";
  }
}

// Listeners de transposición
document.getElementById("v-transp-down").addEventListener("click", () => {
  const s = viewerSlides[viewerIdx]; if (!s || s.type === "pause") return;
  cambiarTransposicion(s.songTitle, -1);
});
document.getElementById("v-transp-up").addEventListener("click", () => {
  const s = viewerSlides[viewerIdx]; if (!s || s.type === "pause") return;
  cambiarTransposicion(s.songTitle, 1);
});
document.getElementById("fs-transp-down").addEventListener("click", () => {
  const s = viewerSlides[viewerIdx]; if (!s || s.type === "pause") return;
  cambiarTransposicion(s.songTitle, -1);
});
document.getElementById("fs-transp-up").addEventListener("click", () => {
  const s = viewerSlides[viewerIdx]; if (!s || s.type === "pause") return;
  cambiarTransposicion(s.songTitle, 1);
});

function actualizarBotonRetomar() {
  document.getElementById("fs-retomar").style.display = fsMinimizado ? "" : "none";
}

// ── Acordes ────────────────────────────────────────────────────
// Convierte texto con [Am]sílaba en HTML con el acorde encima
function renderizarAcordes(texto) {
  if (!texto) return "";
  // Limpiar solo etiquetas de tamaño (fs-XX) pero preservar <b> y <br>
  texto = texto.replace(/<span[^>]*class="fs-[^"]*"[^>]*>/gi, "").replace(/<\/span>/gi, "");
  // Desescapar entidades HTML básicas
  texto = texto.replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"');
  // Dividir por <br> preservándolos
  const lineas = texto.split(/(<br>)/gi);
  return lineas.map(linea => {
    if (/^<br>$/i.test(linea)) return "<br>";
    if (!linea.includes("[")) return linea;
    const partes = linea.split(/(\[[^\]]+\])/);
    let html = "";
    let acordePendiente = null;
    for (const parte of partes) {
      if (/^\[.+\]$/.test(parte)) {
        acordePendiente = parte.slice(1, -1);
      } else {
        if (acordePendiente) {
          // Extraer texto hasta el primer espacio como ancla, preservando HTML
          const stripped = parte.replace(/<[^>]+>/g, "");
          const match = stripped.match(/^(\S*)(\s*.*)?$/s);
          const anclaLen = match ? match[1].length : 0;
          const ancla = parte.slice(0, anclaLen) || "&nbsp;";
          const resto = parte.slice(anclaLen);
          html += `<span class="acorde-wrap"><span class="acorde-txt">${acordePendiente}</span><span class="acorde-sil">${ancla}</span></span>${resto}`;
          acordePendiente = null;
        } else {
          html += parte;
        }
      }
    }
    if (acordePendiente) {
      html += `<span class="acorde-wrap"><span class="acorde-txt">${acordePendiente}</span><span class="acorde-sil">&nbsp;</span></span>`;
    }
    return html;
  }).join("");
}

function cancionTieneAcordes(song) {
  return song && Array.isArray(song.acordes) && song.acordes.length > 0;
}

// ── Filtros ────────────────────────────────────────────────────
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderList();
  });
});

// Tamaño de fuente en proyección — escala con el ancho de pantalla
function getFsSize() {
  const w = window.innerWidth;
  if (w < 480) return 24;       // celular
  if (w < 768) return 30;       // tablet chica
  if (w < 1024) return 36;      // tablet grande
  return 40;                    // desktop
}

// ── localStorage ───────────────────────────────────────────────
function saveToStorage() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({ name: slName, songs: setlist }));
    const ind = document.getElementById("sl-saved");
    ind.style.opacity = "1"; clearTimeout(ind._t);
    ind._t = setTimeout(() => ind.style.opacity = "0", 1800);
  } catch(e) {}
}
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY); if (!raw) return;
    const d = JSON.parse(raw);
    if (d.name) { slName = d.name; document.getElementById("sl-name").value = d.name; }
    if (Array.isArray(d.songs)) setlist = d.songs;
  } catch(e) {}
}

// ── Utilidades ─────────────────────────────────────────────────
function norm(s) { return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
function hlTexto(text, q) {
  if (!q) return text;
  const nq = norm(q), nt = norm(text);
  let r = "", i = 0;
  while (i < text.length) {
    const idx = nt.indexOf(nq, i);
    if (idx === -1) { r += text.slice(i); break; }
    r += text.slice(i, idx) + '<span class="hl">' + text.slice(idx, idx+nq.length) + "</span>";
    i = idx + nq.length;
  }
  return r;
}
function inList(t) { return setlist.includes(t); }
function updateBadge() {
  const tab = document.getElementById("tab-setlist");
  if (setlist.length === 0) {
    tab.textContent = "Crear lista";
  } else {
    const nombre = slName && slName !== "Setlist" ? slName : "";
    tab.textContent = nombre ? `Lista: ${nombre}` : `Lista (${setlist.length})`;
  }
}

// ── HTML para fullscreen ───────────────────────────────────────
function htmlParaFS(html) {
  let result = html.replace(/<br><br>/gi, '<span class="stanza-sep"></span>');
  result = result.replace(/(<span class="stanza-sep"><\/span>)<br>/gi, '$1');
  return result;
}

// ── Tamaño de fuente en proyección ────────────────────────────
const LS_FONT_SIZE = "cancionero_fs_size";
const FS_STEP = 3;
const FS_MIN = 14;
const FS_MAX = 80;
let fsSizeOffset = 0; // delta respecto al tamaño automático

function cargarFontOffset() {
  try { fsSizeOffset = parseInt(localStorage.getItem(LS_FONT_SIZE)) || 0; } catch(e) {}
}
function guardarFontOffset() {
  try { localStorage.setItem(LS_FONT_SIZE, fsSizeOffset); } catch(e) {}
}
function getFsBaseSize() {
  const w = window.innerWidth;
  if (w < 480) return 24;
  if (w < 768) return 30;
  if (w < 1024) return 36;
  return 40;
}
function aplicarFontSize() {
  const size = Math.min(FS_MAX, Math.max(FS_MIN, getFsBaseSize() + fsSizeOffset));
  document.getElementById("fs-content").style.fontSize = size + "px";
  // Botón reset: apagado si estamos en automático
  document.getElementById("fs-size-reset").classList.toggle("auto", fsSizeOffset === 0);
}

document.getElementById("fs-size-down").addEventListener("click", () => {
  fsSizeOffset = Math.max(FS_MIN - getFsBaseSize(), fsSizeOffset - FS_STEP);
  guardarFontOffset(); aplicarFontSize();
});
document.getElementById("fs-size-up").addEventListener("click", () => {
  fsSizeOffset = Math.min(FS_MAX - getFsBaseSize(), fsSizeOffset + FS_STEP);
  guardarFontOffset(); aplicarFontSize();
});
document.getElementById("fs-size-reset").addEventListener("click", () => {
  fsSizeOffset = 0; guardarFontOffset(); aplicarFontSize();
});
cargarFontOffset();

// ── Slides ─────────────────────────────────────────────────────
function buildSlides(queue, pauseEdges) {
  const slides = [];
  const mobile = isMobile();
  const ediciones = cargarEdiciones();
  for (let si = 0; si < queue.length; si++) {
    const song = SONGS.find(s => s.titulo === queue[si]); if (!song) continue;
    if (!mobile) {
      if (si > 0) slides.push({ type:"pause", songIdx:si });
      if (pauseEdges && si === 0) slides.push({ type:"pause", songIdx:si });
    }
    song.slides.forEach((html, i) => {
      const htmlEfectivo = ediciones[song.titulo]?.[i] ?? html;
      slides.push({ type:"slide", html:htmlEfectivo, songIdx:si, slideNum:i+1, totalSlides:song.slides.length, songTitle:song.titulo, songSlides:song.slides });
    });
    if (!mobile && pauseEdges && si === queue.length - 1) slides.push({ type:"pause", songIdx:si });
  }
  return slides;
}
function buildSingle(song, pauseEdges) {
  const slides = [];
  const mobile = isMobile();
  const ediciones = cargarEdiciones();
  if (!mobile && pauseEdges) slides.push({ type:"pause", songIdx:0 });
  song.slides.forEach((html, i) => {
    const htmlEfectivo = ediciones[song.titulo]?.[i] ?? html;
    slides.push({ type:"slide", html:htmlEfectivo, songIdx:0, slideNum:i+1, totalSlides:song.slides.length, songTitle:song.titulo, songSlides:song.slides });
  });
  if (!mobile && pauseEdges) slides.push({ type:"pause", songIdx:0 });
  return slides;
}

// ── Carga canciones.json ───────────────────────────────────────
async function cargarCanciones() { // retorna promesa — cargarSetlist() se encadena después
  try {
    const res = await fetch("canciones.json");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    SONGS = await res.json();
    setlist = setlist.filter(t => SONGS.some(s => s.titulo === t));
    document.getElementById("loading").style.display = "none";
    updateBadge(); renderList();
    if (activeTab === "setlist") renderSetlist();
  } catch(e) {
    document.getElementById("loading").style.display = "none";
    const err = document.getElementById("error-msg"); err.style.display = "block";
    err.innerHTML = `<strong>No se pudo cargar canciones.json</strong><br><br>
      Asegurate de que <code>canciones.json</code> esté en la misma carpeta que
      <code>index.html</code> y que el sitio esté siendo servido desde un servidor web.<br><br>
      Error: <code>${e.message}</code>`;
  }
}

// ── Carga setlist.json del repositorio ────────────────────────
function limpiarLista() {
  setlist = []; slName = "";
  const slNameEl = document.getElementById("sl-name");
  slNameEl.value = "";
  slNameEl.placeholder = "";
  updateBadge(); renderList();
  if (activeTab === "setlist") renderSetlist();
}

function aplicarSetlist(d) {
  if (d.name) { slName = d.name; document.getElementById("sl-name").value = d.name; }
  if (Array.isArray(d.songs)) {
    setlist = d.songs.filter(t => SONGS.some(s => s.titulo === t));
  }
  updateBadge(); renderList();
  if (activeTab === "setlist") renderSetlist();
}

async function cargarSetlist() {
  try {
    const res = await fetch("setlist.json");
    if (!res.ok) {
      // No existe setlist.json — usar localStorage si hay
      loadFromStorage(); updateBadge(); renderList();
      if (activeTab === "setlist") renderSetlist();
      return;
    }
    const d = await res.json();

    // Verificar vencimiento
    if (d.expira) {
      const hoy = new Date(); hoy.setHours(0,0,0,0);
      const expira = new Date(d.expira); expira.setHours(0,0,0,0);
      if (hoy > expira) {
        // Verificar si el usuario ya creó algo nuevo después del vencimiento
        const raw = localStorage.getItem(LS_KEY);
        if (raw) {
          try {
            const local = JSON.parse(raw);
            // Si hay canciones en localStorage, el usuario ya creó una lista nueva → respetarla
            if (Array.isArray(local.songs) && local.songs.length > 0) {
              loadFromStorage(); updateBadge(); renderList();
              if (activeTab === "setlist") renderSetlist();
              return;
            }
          } catch(e) {}
        }
        // No hay lista nueva del usuario — limpiar todo
        try { localStorage.removeItem(LS_KEY); } catch(e) {}
        limpiarLista();
        return;
      }
    }

    // Setlist del repo válida — verificar si tiene canciones
    const songs = Array.isArray(d.songs) ? d.songs.filter(t => SONGS.some(s => s.titulo === t)) : [];
    if (songs.length === 0) {
      // Sin canciones en repo — usar localStorage si hay
      const raw = localStorage.getItem(LS_KEY);
      if (raw) { loadFromStorage(); }
      else { limpiarLista(); return; }
      updateBadge(); renderList();
      if (activeTab === "setlist") renderSetlist();
      return;
    }

    // Repo tiene canciones válidas y no vencida — tiene prioridad
    aplicarSetlist(d);

  } catch(e) {
    // Error de red — usar localStorage
    loadFromStorage(); updateBadge(); renderList();
    if (activeTab === "setlist") renderSetlist();
  }
}
document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => {
  activeTab = t.dataset.tab;
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active")); t.classList.add("active");
  document.getElementById("cancionero-panel").style.display = activeTab === "cancionero" ? "block" : "none";
  document.getElementById("setlist-panel").style.display = activeTab === "setlist" ? "flex" : "none";
  if (activeTab === "setlist") renderSetlist();
}));

// ── Cancionero ─────────────────────────────────────────────────
function renderList() {
  const q = norm(query);
  const filtered = SONGS.filter(c => {
    // Filtro de categoría
    if (activeFilter === "himnos" && c.carpeta !== "Himnos") return false;
    if (activeFilter === "nuevas" && !c.nueva) return false;
    if (activeFilter === "escuela" && c.carpeta !== "Escuela bíblica") return false;
    if (activeFilter === "navidad" && c.carpeta !== "Navidad") return false;
    // Filtro de búsqueda
    return norm(c.titulo).includes(q) || (c.preview && norm(c.preview).includes(q));
  });
  document.getElementById("count").textContent =
    filtered.length === SONGS.length ? SONGS.length + " canciones"
    : filtered.length + " resultado" + (filtered.length !== 1 ? "s" : "");
  const list = document.getElementById("song-list"); list.innerHTML = "";
  filtered.forEach(c => {
    const inL = inList(c.titulo);
    const card = document.createElement("div"); card.className = "sc" + (inL ? " in-list" : "");
    let previewHtml = "";
    if (q && c.preview && norm(c.preview).includes(q)) {
      const linea = c.preview.split(/\n/).find(l => norm(l).includes(q));
      if (linea) previewHtml = `<div class="sp">${hlTexto(linea.trim(), query)}...</div>`;
    }
    card.innerHTML = `
      <div class="sc-info">
        <div class="st">${hlTexto(c.titulo, query)}${c.acordes ? ' <span style="color:#7eb8f7;font-size:12px">♫</span>' : ""}</div>
        <div class="sm">${c.tono ? `<span style="color:var(--green-tx);font-weight:500">${c.tono}</span> &middot; ` : ""}Carpeta ${c.carpeta} &middot; ${c.slides.length} diapositiva${c.slides.length !== 1 ? "s" : ""}</div>
        ${previewHtml}
      </div>
      <button class="add-btn">${inL ? "&#8722;" : "&#43;"}</button>`;
    card.querySelector(".add-btn").addEventListener("click", e => { e.stopPropagation(); toggleSL(c.titulo); });
    card.querySelector(".sc-info").addEventListener("click", () => openSong(c, null));
    list.appendChild(card);
  });
}
function toggleSL(t) {
  const idx = setlist.indexOf(t);
  if (idx === -1) setlist.push(t); else setlist.splice(idx, 1);
  saveToStorage(); updateBadge(); renderList();
  if (activeTab === "setlist") renderSetlist();

function fuzzyScore(a, b) {
  a = norm(a); b = norm(b);
  if (b.includes(a) || a.includes(b)) return 1;
  const wa = a.split(/\s+/), wb = b.split(/\s+/);
  const comunes = wa.filter(w => w.length > 2 && wb.some(bw => bw.includes(w) || w.includes(bw)));
  if (comunes.length === 0) return 0;
  return comunes.length / Math.max(wa.length, wb.length);
}

function buscarFuzzy(linea) {
  let mejor = null, mejorScore = 0;
  for (const song of SONGS) {
    let score = fuzzyScore(linea, song.titulo);
    if (song.preview) score = Math.max(score, fuzzyScore(linea, song.preview) * 0.85);
    if (score > mejorScore) { mejorScore = score; mejor = song; }
  }
  return { song: mejor, score: mejorScore };
}

let matchResults = [];

document.getElementById("txt-interpretar").addEventListener("click", () => {
  const texto = document.getElementById("txt-input").value.trim();
  if (!texto) return;

  const lineas = texto.split("\n")
    .map(l => l
      .trim()
      .replace(/^[\d]+[.\-\)]\s*/, "")      // numeración: "1. " "1- " "1) "
      .replace(/^[•\-\*\+►▶→»·–—]\s*/, "") // viñetas y flechas
      .replace(/^\p{Emoji}+\s*/u, "")        // emojis al inicio
      .replace(/_/g, " ")                    // guiones bajos → espacio
      .replace(/\s+[A-Ga-g](?:do|re|mi|fa|sol|la|si|DO|RE|MI|FA|SOL|LA|SI)?-?\s*$/i, "") // tonalidad al final
      .replace(/\s+(do|re|mi|fa|sol|la|si)m?\s*$/i, "") // tonalidades en español al final (Do, LAm, MIm, etc.)
      .trim()
    )
    .filter(l => l.length > 0);
  const status = document.getElementById("txt-status");
  const resultsEl = document.getElementById("txt-results");
  resultsEl.innerHTML = "";
  document.getElementById("txt-confirm-wrap").style.display = "none";
  matchResults = [];

  matchResults = lineas.map(linea => {
    const { song, score } = buscarFuzzy(linea);
    if (score >= 0.6) return { linea, song, tipo: "ok" };
    if (score >= 0.3) return { linea, song, tipo: "warn" };
    return { linea, song, tipo: "err" };
  });

  const ok = matchResults.filter(r => r.tipo === "ok").length;
  const warn = matchResults.filter(r => r.tipo === "warn").length;
  const err = matchResults.filter(r => r.tipo === "err").length;

      <span class="match-icon">${icon}</span>
      <div style="flex:1;min-width:0">
        <div class="match-original">${r.linea}</div>
        <div class="match-found ${r.tipo === "err" ? "err" : ""}">${foundText}</div>
      </div>
      <select class="match-select" data-idx="${i}">
        <option value="">— no incluir —</option>
        ${options}
      </select>`;

    div.querySelector(".match-select")?.addEventListener("change", e => {
      matchResults[i].song = SONGS.find(s => s.titulo === e.target.value) || null;
      matchResults[i].tipo = e.target.value ? "warn" : "err";

const LS_EDICIONES = "cancionero_ediciones"; // { "Titulo": ["html slide 0", null, "html slide 2", ...] }

function cargarEdiciones() {
  try { return JSON.parse(localStorage.getItem(LS_EDICIONES)) || {}; } catch(e) { return {}; }
}
function guardarEdiciones(obj) {
  try { localStorage.setItem(LS_EDICIONES, JSON.stringify(obj)); } catch(e) {}
}

// Convierte HTML de slide a texto plano editable (quita <b>, convierte <br> en salto de línea)
function htmlATexto(html) {
  return html
    .replace(/<b>/gi, "").replace(/<\/b>/gi, "")
    .replace(/<br>/gi, "\n")
    .trim();
}

// Convierte texto plano de vuelta a HTML (saltos de línea → <br>, envuelve en <b> si el original los tenía)
function textoAHtml(texto, htmlOriginal) {
  const teniaBold = /<b>/i.test(htmlOriginal);
  const lineas = texto.split("\n");
  const inner = lineas.join("<br>");
  return teniaBold ? `<b>${inner}</b>` : inner;
}

// Devuelve el html efectivo de un slide (edición si existe, original si no)
function getSlideHtml(songTitulo, slideIdx, htmlOriginal) {
  const ediciones = cargarEdiciones();
  return ediciones[songTitulo]?.[slideIdx] ?? htmlOriginal;
}

// Aplica ediciones guardadas a viewerSlides
function aplicarEdicionesAViewerSlides() {
  viewerSlides.forEach(s => {
    if (s.type !== "slide") return;
    const ediciones = cargarEdiciones();
    const editado = ediciones[s.songTitle]?.[s.slideNum - 1];
    if (editado !== undefined && editado !== null) s.html = editado;
  });
}

let editSlideIdx = null; // índice en viewerSlides del slide que se está editando

function abrirEditor() {
  const s = viewerSlides[viewerIdx];
  if (!s) return;

  // Si estamos en pausa, buscar el slide más cercano
  const slideRef = s.type === "pause"
    ? (viewerSlides.slice(0, viewerIdx).reverse().find(sl => sl.type === "slide")
    || viewerSlides.slice(viewerIdx + 1).find(sl => sl.type === "slide"))
    : s;
  if (!slideRef) return;

  editSlideIdx = viewerSlides.indexOf(slideRef);

  const ediciones = cargarEdiciones();
  const htmlActual = ediciones[s.songTitle]?.[s.slideNum - 1] ?? s.html;
  const tieneEdicion = ediciones[s.songTitle]?.[s.slideNum - 1] !== undefined;

  document.getElementById("edit-modal-title").textContent = s.songTitle;
  document.getElementById("edit-modal-sub").textContent =
    `Diapositiva ${s.slideNum} de ${s.totalSlides}`;
  document.getElementById("edit-textarea").value = htmlATexto(htmlActual);
  document.getElementById("edit-descartar").classList.toggle("hidden", !tieneEdicion);
  const totalEdiciones = Object.keys(cargarEdiciones()).length;
  document.getElementById("edit-modal-footer").classList.toggle("hidden", totalEdiciones === 0);
  document.getElementById("edit-modal-bg").classList.add("open");
  document.getElementById("edit-textarea").focus();
}

function cerrarEditor() {
  document.getElementById("edit-modal-bg").classList.remove("open");
  editSlideIdx = null;
}

function guardarEdicion() {
  const s = viewerSlides[editSlideIdx];
  if (!s || s.type === "pause") return;

  const textoNuevo = document.getElementById("edit-textarea").value;
  const htmlOriginal = s.songSlides[s.slideNum - 1]; // html original de SONGS
  const htmlNuevo = textoAHtml(textoNuevo, htmlOriginal);

  // Persistir en localStorage
  const ediciones = cargarEdiciones();
  if (!ediciones[s.songTitle]) ediciones[s.songTitle] = {};
  ediciones[s.songTitle][s.slideNum - 1] = htmlNuevo;
  guardarEdiciones(ediciones);

  // Actualizar el slide en memoria
  s.html = htmlNuevo;

  cerrarEditor();
  renderViewerSlide();
}

function descartarEdicion() {
  const s = viewerSlides[editSlideIdx];
  if (!s) return;

  const ediciones = cargarEdiciones();
  if (ediciones[s.songTitle]) {
    delete ediciones[s.songTitle][s.slideNum - 1];
    if (Object.keys(ediciones[s.songTitle]).length === 0) delete ediciones[s.songTitle];
    guardarEdiciones(ediciones);
  }

  // Restaurar html original en el slide en memoria
  s.html = s.songSlides[s.slideNum - 1];

  cerrarEditor();
  renderViewerSlide();
}

});
document.getElementById("fs-btn-acordes").addEventListener("click", () => {
  fsMinimizado = false; fsMostrarAcordes = true; actualizarBotonRetomar();
  const curSlide = viewerSlides.find(s => s.type === "slide");
  const curSong = curSlide ? SONGS.find(c => c.titulo === curSlide.songTitle) : null;
  if (viewerQueue && viewerQueue.length > 0) viewerSlides = buildSlides(viewerQueue, false);
  else if (curSong) viewerSlides = buildSingle(curSong, false);
  viewerIdx = 0;
  const o = document.getElementById("fso"); o.style.display = "flex";
  if (o.requestFullscreen) o.requestFullscreen();
  liberarOrientacion();
  renderFSNewSong();
});
document.getElementById("fs-btn-edges").addEventListener("click", () => {
  fsMinimizado = false; fsMostrarAcordes = false; actualizarBotonRetomar();
  const curSlide = viewerSlides.find(s => s.type === "slide");
  const curSong = curSlide ? SONGS.find(c => c.titulo === curSlide.songTitle) : null;
  if (viewerQueue && viewerQueue.length > 0) {
    viewerSlides = buildSlides(viewerQueue, true);
  } else if (curSong) {
    viewerSlides = buildSingle(curSong, true);
  } else { return; }
  viewerIdx = 0;
  const o = document.getElementById("fso"); o.style.display = "flex";
  if (o.requestFullscreen) o.requestFullscreen();
  liberarOrientacion();
  renderFSNewSong();
});
document.getElementById("fs-cl").addEventListener("click", () => {
  document.getElementById("fso").style.display = "none";
  if (document.fullscreenElement) document.exitFullscreen();
  bloquearPortrait();
  fsMinimizado = false; actualizarBotonRetomar();
  // Si el índice actual apunta a una pausa, buscar el próximo slide con contenido
  if (viewerSlides[viewerIdx]?.type === "pause") {
    const next = viewerSlides.findIndex((s, i) => i >= viewerIdx && s.type === "slide");
    if (next >= 0) viewerIdx = next;
  }
  renderViewerSlide();
  // Volver al inicio del contenido
  window.scrollTo(0, 0);
  document.getElementById("fs-center").scrollTop = 0;
});
document.getElementById("fs-minimize").addEventListener("click", () => {
  if (document.fullscreenElement) document.exitFullscreen();
  bloquearPortrait();
  document.getElementById("fso").style.display = "none";
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("tabs").style.display = "none";
  fsMinimizado = true; actualizarBotonRetomar();
});
document.getElementById("fs-retomar").addEventListener("click", () => {
  // Retomar en la diapositiva exacta donde se minimizó
  const o = document.getElementById("fso"); o.style.display = "flex";
  if (o.requestFullscreen) o.requestFullscreen();
  liberarOrientacion();
  renderFS();
});
document.getElementById("fs-prev-slide").addEventListener("click", () => goSlide(-1));
document.getElementById("fs-next-slide").addEventListener("click", () => goSlide(1));
document.getElementById("fs-ps").addEventListener("click", () => goSong(-1));
document.getElementById("fs-ns").addEventListener("click", () => goSong(1));

window.addEventListener("resize", () => {
  if (document.getElementById("fso").style.display === "flex") aplicarFontSize();
});

document.addEventListener("keydown", e => {
  const fsOpen = document.getElementById("fso").style.display === "flex";
  const inViewer = document.getElementById("viewer").style.display === "flex";
  if (fsOpen || inViewer) {
    if (e.key === "ArrowLeft" && !e.shiftKey) goSlide(-1);
    else if (e.key === "ArrowRight" && !e.shiftKey) goSlide(1);
    else if (e.key === "ArrowLeft" && e.shiftKey) goSong(-1);
    else if (e.key === "ArrowRight" && e.shiftKey) goSong(1);
    else if (e.key === "Escape" && fsOpen) {
      document.getElementById("fso").style.display = "none";
      if (document.fullscreenElement) document.exitFullscreen();
    }
  }
});

// ── Swipe táctil ───────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0;
const SWIPE_MIN = 50;   // px mínimos para considerar swipe
const SWIPE_RATIO = 1.5; // debe ser más horizontal que vertical

function onTouchStart(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}
function onTouchEnd(e) {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < SWIPE_MIN || Math.abs(dx) < Math.abs(dy) * SWIPE_RATIO) return;
  if (isMobile()) {
    // En móvil: swipe cambia de canción
    if (dx < 0) goSong(1); else goSong(-1);
  } else {
    // En desktop: swipe cambia de diapositiva
    if (dx < 0) goSlide(1); else goSlide(-1);
  }
}

document.getElementById("slide-box").addEventListener("touchstart", onTouchStart, { passive: true });
document.getElementById("slide-box").addEventListener("touchend", onTouchEnd, { passive: true });
document.getElementById("fs-center").addEventListener("touchstart", onTouchStart, { passive: true });
document.getElementById("fs-center").addEventListener("touchend", onTouchEnd, { passive: true });
document.getElementById("setlist-panel").style.display = "none";
updateBadge();
cargarCanciones().then(() => cargarSetlist());

// ── Service Worker (offline + auto-actualización) ──────────────
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").then(reg => {
    // Detectar cuando hay un nuevo SW instalado y listo
    reg.addEventListener("updatefound", () => {
      const newWorker = reg.installing;
      newWorker.addEventListener("statechange", () => {
        // Cuando el nuevo SW está instalado y hay uno previo activo → recargar
        if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
          newWorker.postMessage("skipWaiting");
        }
      });
    });
  }).catch(() => {});

  // Cuando el SW toma control (después de skipWaiting) → recargar la página
  let recargando = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (!recargando) { recargando = true; window.location.reload(); }
  });
}
</script>
